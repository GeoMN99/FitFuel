<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFuel - Meals</title>
    <link rel="stylesheet" href="styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!--NavBar-->
    <header>
     <nav>
        <div class="logo"><a href="index.html">🔥 FitFuel</a></div>

        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="workouts.html">Workouts</a></li>
            <li><a href="meals.html" class="active">Meals</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="history.html">History</a></li>
        </ul>
     </nav>
    </header>

    <!-- Page Header-->
    <main>
      <section class="page-header">
        <h1>🥗 Meal Logger</h1>
        <p>Fuel smart. Eat with purpose!</p>
      </section> 

      <!-- Meal Form-->
       <section class="form-section">
        <div class="form-box">
            <h2>Log a Meal</h2>
            <input type="text" id="meal-name" placeholder="Meal (e.g. Chicken & Rice)"/>
            <input type="text" id="meal-portion" placeholder="Portion (e.g. 1 plate)"/>
            <input type="number" id="meal-calories" placeholder="Calories"/>

            <!-- Meal Type Dropdown -->
             <select id="meal-type">
                <option value="">Select Meal Type</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
             </select>

             <button onclick="addMeal()">➕ Add Meal</button>
        </div>
       </section>

       <!-- Meal List-->
        <section class="list-section">
            <h2>
                <img src="siyuan-hu-pKYtwDzU6dA-unsplash.jpg" alt="a fork and knife icon" />
                Today's Meals
            </h2>
            <ul id="meal-list"></ul>
            <p id="meal-total" class="total-label">Total Consumed: 0 kcal</p>
        </section>
    </main>   

        <!-- Footer-->
         <footer>
            <p>FitFuel &copy; 2026 - Stay Consistent. Stay Fuelled.</p>
         </footer>

         <script src="js/meals.js"></script>


         <script>
            function toggleMenu() {
                const nav = document.getElementById('nav-links');
                nav.classList.toggle('open');
            }
            </script>
</body>
</html>
